services:
  streamixer:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./media:/media:ro
    tmpfs:
      - /dev/shm/streamixer:size=512M
    environment:
      - MEDIA_DIR=/media
      - TMP_DIR=/dev/shm/streamixer
      - PORT=8080
      - CACHE_TTL=30m
      - CACHE_SWEEP_INTERVAL=5m
    restart: unless-stopped
