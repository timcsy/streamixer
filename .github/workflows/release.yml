name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  wordpress-plugin:
    name: Package WordPress Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package plugin as zip
        run: |
          cd wordpress
          zip -r ../streamixer-wordpress.zip streamixer/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamixer-wordpress
          path: streamixer-wordpress.zip

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [docker, wordpress-plugin]
    steps:
      - uses: actions/checkout@v4

      - name: Download WordPress plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: streamixer-wordpress

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: streamixer-wordpress.zip
